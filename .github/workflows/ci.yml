name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Backend Dependencies
        run: npm ci

      - name: Backend Syntax Check
        run: >-
          node --check
          server/index.js
          server/webhook.js
          server/wsAuth.js
          server/auth.js
          server/log.js
          server/rateLimit.js
          server/validation.js
          worker/index.js
          worker/runner.js
          worker/analyzer.js
          worker/report.js

      - name: Backend Unit Tests
        run: npm test

      - name: Security Audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: flux-ui/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci --prefix flux-ui

      - name: Frontend Lint
        run: npm --prefix flux-ui run lint

      - name: Frontend Build
        run: npm --prefix flux-ui run build
