services:
  redis:
    image: redis:7-alpine
    container_name: flux-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: flux-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flux_local_only_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-flux}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d flux"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: flux-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  redis_data:
  pg_data:
  ollama_data:
